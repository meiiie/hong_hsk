<svg width="1600" height="260" viewBox="0 0 1600 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hồng HSK4 Studio study flow</title>
  <desc id="desc">A lightweight animated flow from import to review, stroke practice, mock exam and Cloudflare deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7F0"/>
      <stop offset="0.52" stop-color="#FFF0F1"/>
      <stop offset="1" stop-color="#F9F6EF"/>
    </linearGradient>
    <linearGradient id="line" x1="155" y1="130" x2="1445" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9F2734"/>
      <stop offset="0.45" stop-color="#D95D67"/>
      <stop offset="1" stop-color="#A76507"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#582B27" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1600" height="260" rx="34" fill="url(#bg)"/>
  <path d="M80 218 C280 140 330 230 520 160 C690 98 760 210 950 130 C1120 58 1210 150 1520 66" stroke="#DDE8E2" stroke-width="2"/>
  <path d="M155 130H1445" stroke="url(#line)" stroke-width="10" stroke-linecap="round" opacity="0.28"/>
  <g>
    <circle cx="155" cy="130" r="13" fill="#9F2734">
