      <animate attributeName="fill" values="#9F2734;#D95D67;#9F2734;#1F2230;#A76507;#9F2734" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="130" r="24" stroke="#9F2734" stroke-width="3" opacity="0.25">
      <animate attributeName="cx" values="155;480;800;1120;1445;155" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="r" values="18;28;18" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.38;0.08;0.38" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
