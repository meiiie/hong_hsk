name: Deploy Cloudflare Pages

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://hsk4.holilihu.online/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Cloudflare credentials
        id: cloudflare_credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Missing CLOUDFLARE_ACCOUNT_ID repository secret. Skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::Missing CLOUDFLARE_API_TOKEN repository secret. Create a Cloudflare API token with Account > Cloudflare Pages > Edit, then add it to GitHub Actions secrets."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Typecheck and build
        if: steps.cloudflare_credentials.outputs.ready == 'true'
        run: npm run check && npm run build

      - name: Deploy
        if: steps.cloudflare_credentials.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name hong-hsk4-studio --branch main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
