version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Ho_Chi_Minh
  - package-ecosystem: pip
    directory: /tests
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Ho_Chi_Minh
