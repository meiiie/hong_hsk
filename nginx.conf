map $uri $cache_control_header {
  default "no-cache";
  ~^/assets/ "public, max-age=31536000, immutable";
  ~^/(icon|maskable-icon)\.svg$ "public, max-age=86400";
  =/og-image.png "public, max-age=86400";
  =/sw.js "no-cache, no-store, must-revalidate";
  =/manifest.webmanifest "no-cache";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), xr-spatial-tracking=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net https://raw.githubusercontent.com; worker-src 'self'; manifest-src 'self'; form-action 'self'" always;
  add_header Cache-Control $cache_control_header always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location /assets/ {
    try_files $uri =404;
  }

  location = /sw.js {
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
